plugins {
    id 'com.android.library'
}

android {
    namespace "org.opencv"
    compileSdk 34

    defaultConfig {
        minSdk 24
        targetSdk 34
    }

    buildFeatures {
        buildConfig true   // 🔥 THIS FIXES YOUR ERROR
    }

    sourceSets {
        main {
            java.srcDirs = ['src']
            res.srcDirs = ['res']   // 🔥 THIS IS MISSING
            jniLibs.srcDirs = ['libs']
        }
    }
}

dependencies {}